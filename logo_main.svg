<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e6a817"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81e45"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="250" cy="250" r="230" fill="none" stroke="url(#gold)" stroke-width="4"/>

  <!-- Shield -->
  <path d="M250 60 L380 120 L380 260 Q380 370 250 420 Q120 370 120 260 L120 120 Z" 
        fill="url(#shield)" stroke="url(#gold)" stroke-width="5" filter="url(#shadow)"/>

  <!-- Inner shield line -->
  <path d="M250 85 L360 140 L360 255 Q360 350 250 395 Q140 350 140 255 L140 140 Z" 
        fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>

  <!-- Football icon -->
  <circle cx="250" cy="195" r="50" fill="#fff" stroke="#333" stroke-width="3"/>
  <path d="M250 145 L250 245 M200 195 L300 195 M215 160 L285 230 M285 160 L215 230" 
        stroke="#333" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M250 145 Q270 170 285 160 Q295 180 300 195 Q285 210 285 230 Q270 240 250 245 Q230 240 215 230 Q215 210 200 195 Q205 180 215 160 Q230 170 250 145" 
        fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Star decorations -->
  <polygon points="150,100 155,115 170,115 158,125 162,140 150,130 138,140 142,125 130,115 145,115" fill="url(#gold)"/>
  <polygon points="350,100 355,115 370,115 358,125 362,140 350,130 338,140 342,125 330,115 345,115" fill="url(#gold)"/>

  <!-- Trophy icons -->
  <path d="M170 300 L170 330 Q170 340 180 340 L220 340 Q230 340 230 330 L230 300" 
        fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <path d="M155 300 Q155 280 170 280 L230 280 Q245 280 245 300" 
        fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="340" x2="200" y2="355" stroke="url(#gold)" stroke-width="4"/>
  <line x1="180" y1="355" x2="220" y2="355" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>

  <path d="M270 300 L270 330 Q270 340 280 340 L320 340 Q330 340 330 330 L330 300" 
        fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <path d="M255 300 Q255 280 270 280 L330 280 Q345 280 345 300" 
        fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <line x1="300" y1="340" x2="300" y2="355" stroke="url(#gold)" stroke-width="4"/>
  <line x1="280" y1="355" x2="320" y2="355" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>

  <!-- Arabic text -->
  <text x="250" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#gold)" filter="url(#shadow)">أوهارا</text>
  <text x="250" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#aaa">المدرب الأفضل</text>
</svg>