    <canvas id="canvas"></canvas>

    <script>
        function svgToDataUrl(svgId) {
            const svg = document.getElementById(svgId);
            const clone = svg.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            const svgData = new XMLSerializer().serializeToString(clone);
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
        }

        function download(svgId, filename, size, type) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const w = type === 'banner' ? 800 : size;
            const h = type === 'banner' ? 300 : size;
            canvas.width = w;
            canvas.height = h;

            const img = new Image();
            img.onload = function () {
                ctx.drawImage(img, 0, 0, w, h);
                const link = document.createElement('a');
                link.download = filename + '.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            };
            img.src = svgToDataUrl(svgId);
        }

        function downloadAll() {
            const items = [
                ['svg1', 'ohara_main', 500],
                ['svg2', 'ohara_icon', 200],
                ['svg3', 'ohara_avatar', 512],
                ['svg4', 'ohara_banner', 800, 'banner'],
                ['svg5', 'ohara_flat', 512]
            ];
            let i = 0;
            function next() {
                if (i >= items.length) return;
                download(...items[i]);
                i++;
                setTimeout(next, 500);
            }
            next();
        }
    </script>
